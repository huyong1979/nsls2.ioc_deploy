---

# This is no longer needed, since we do the replacement recursively.
# - name: Ensure macro value doesn't also contain macro
#  ansible.builtin.fail:
#    msg: >-
#      "Environment variable {{ install_ioc_macro_in_var }} uses a macro!"
#      "Make sure environment vars are in a valid order!"
#  when: install_ioc_merged_env[install_ioc_macro_in_var] | regex_search('\\$\\(')

- name: Full macro regex
  ansible.builtin.set_fact:
    install_ioc_macro_regex: "\\$\\({{ install_ioc_macro_in_var }}\\)"

- name: Replace macros
  ansible.builtin.set_fact:
    install_ioc_replaced_macros:
      "{{ install_ioc_replaced_macros |
          regex_replace(install_ioc_macro_regex,
                        install_ioc_merged_env[install_ioc_macro_in_var]) }}"
