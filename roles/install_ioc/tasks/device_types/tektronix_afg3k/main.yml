---

- name: Install base.cmd file Tektronix AFG3K
  ansible.builtin.template:
    src: "{{ role_path }}/tasks/device_types/{{ ioc.type }}/templates/base.cmd.j2"
    dest: "{{ install_ioc_ioc_directory }}/iocBoot/base.cmd"
    owner: "{{ host_config.softioc_user }}"
    group: "{{ host_config.softioc_group }}"
    mode: "0664"

- name: Install EPICS database template files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ install_ioc_ioc_directory }}/db"
    owner: "{{ host_config.softioc_user }}"
    group: "{{ host_config.softioc_group }}"
    mode: "0664"
  with_fileglob: "{{ role_path }}/tasks/device_types/{{ ioc.type }}/files/*.template"

- name: Create protocol directory
  ansible.builtin.file:
    path: "{{ install_ioc_ioc_directory }}/protocol"
    state: directory
    owner: "{{ host_config.softioc_user }}"
    group: "{{ host_config.softioc_group }}"
    mode: "02775"

- name: Install Tektronix AFG3K protocol file
  ansible.builtin.copy:
    src: "{{ role_path }}/tasks/device_types/{{ ioc.type }}/files/afg3k.proto"
    dest: "{{ install_ioc_ioc_directory }}/protocol/afg3k.proto"
    owner: "{{ host_config.softioc_user }}"
    group: "{{ host_config.softioc_group }}"
    mode: "0664"
