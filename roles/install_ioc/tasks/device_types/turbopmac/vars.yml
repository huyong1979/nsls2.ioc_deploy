---
install_ioc_use_common: true
install_ioc_required_module: "tpmac_44274d1"
install_ioc_executable: tpmac
install_ioc_template_root_path: "{{ install_ioc_required_module_path }}"
install_ioc_make_autosave_files: true

# Generated req files don't need macros
install_ioc_req_file_list:
  - name: info_positions.req
    macros: ""
  - name: info_settings.req
    macros: ""

install_ioc_device_specific_env:
  STREAM_PROTOCOL_PATH: "$(EPICS_BASE)/protocol:$(TPMAC)/protocol:$(TOP)/protocol:."
