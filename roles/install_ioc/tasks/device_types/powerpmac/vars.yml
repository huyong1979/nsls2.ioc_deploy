---
install_ioc_use_common: true
install_ioc_required_module: ppmac_7d627e7
install_ioc_executable: ppmac
install_ioc_template_root_path: "{{ install_ioc_required_module_path }}"
install_ioc_make_autosave_files: true

install_ioc_device_specific_env:
  STREAM_PROTOCOL_PATH: "$(PMAC)/protocol:$(PPMAC)/protocol:$(TOP)/protocol"
  CTRL_PORT: M0
  SSH_PORT: P0
  CT_PREFIX: "$(CT_SYS){$(CONTROLLER)}"
  IOC_PREFIX: "$(CT_SYS){IOC-$(CONTROLLER)}"
  MOVING_POLL_PERIOD: 100
  IDLE_POLL_PERIOD: 1000
