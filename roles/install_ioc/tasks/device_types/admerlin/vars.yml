---

install_ioc_use_ad_common: true
install_ioc_required_module: admerlin_f9b6b1b
install_ioc_as_dir_name: autosave
install_ioc_template_root_path:
  "{{ install_ioc_required_module_path }}/iocs/merlinIOC"

install_ioc_device_specific_env:
  ADMERLIN: "/epics/modules/ADMerlin"
  PORT: "ML"
  QSIZE: 20
  XSIZE: 512
  YSIZE: 512
  NCHANS: 2048
  CBUFFS: 500
  MAX_THREADS: 8
  EPICS_DB_INCLUDE_PATH: "$(ADCORE)/db:$(ADMERLIN)/db"
  NELEMENTS: 5000000
  COMMAND_PORT: "$(PORT)cmd"
  DATA_PORT: "$(PORT)data"
