---

type: enum("linkamt96")
environment:
  ENGINEER: str()
  PREFIX: str()
  PORT: str()  # asyn port
  MOXA_HOST: str(required=False)  # Moxa terminal server IP/hostname (socat PTY bridge)
  MOXA_PORT: str(required=False)  # Moxa TCP port (socat PTY bridge)
  SERIAL_PORT: str(required=False)
  VENDOR_ID: str(required=False)
  PRODUCT_ID: str(required=False)
  LINKAM3_LICENSE_PATH: str(required=False)  # default: /etc/linkam/Linkam.lsk
  LINKAM3_LOG_PATH: str()
